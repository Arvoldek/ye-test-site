<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Quick Example Card</title>

        <!-- Google Font: Source Sans Pro -->
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback"
        />
        <!-- Font Awesome -->
        <link rel="stylesheet" href="../../../plugins/fontawesome-free/css/all.min.css" />
        <!-- Theme style -->
        <link rel="stylesheet" href="../../../dist/css/adminlte.min.css" />
        <script src="../../../ye_script.js" defer></script>
    </head>

    <body style="overflow-y: scroll;">
        <!-- general form elements -->
        <div class="card card-primary">
            <div class="card-header">
                <h3 class="card-title">Quick Example</h3>
            </div>
            <!-- /.card-header -->
            <!-- form start -->
            <form>
                <div class="card-body">
                    <div class="form-group">
                        <label for="exampleInputFirstName">First Name</label>
                        <input
                            type="text"
                            class="form-control"
                            id="exampleInputFirstName"
                            placeholder="Enter first name"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputLastName">Last Name</label>
                        <input
                            type="text"
                            class="form-control"
                            id="exampleInputLastName"
                            placeholder="Enter last name"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputEmail1">Email address</label>
                        <input
                            type="email"
                            class="form-control"
                            id="exampleInputEmail1"
                            placeholder="Enter email"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputPhone">Phone Number</label>
                        <input
                            type="tel"
                            class="form-control"
                            id="exampleInputPhone"
                            placeholder="Enter phone number"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputAddress">Street Address</label>
                        <input
                            type="text"
                            class="form-control"
                            id="exampleInputAddress"
                            placeholder="Enter street address"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputCity">City</label>
                        <input
                            type="text"
                            class="form-control"
                            id="exampleInputCity"
                            placeholder="Enter city"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputState">State</label>
                        <input
                            type="text"
                            class="form-control"
                            id="exampleInputState"
                            placeholder="Enter state"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputZip">Zip Code</label>
                        <input
                            type="text"
                            class="form-control"
                            id="exampleInputZip"
                            placeholder="Enter zip code"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputCountry">Country</label>
                        <input
                            type="text"
                            class="form-control"
                            id="exampleInputCountry"
                            placeholder="Enter country"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputPassword1">Password</label>
                        <input
                            type="password"
                            class="form-control"
                            id="exampleInputPassword1"
                            placeholder="Password"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputPassword2">Confirm Password</label>
                        <input
                            type="password"
                            class="form-control"
                            id="exampleInputPassword2"
                            placeholder="Confirm password"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputCompany">Company</label>
                        <input
                            type="text"
                            class="form-control"
                            id="exampleInputCompany"
                            placeholder="Enter company name"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputJobTitle">Job Title</label>
                        <input
                            type="text"
                            class="form-control"
                            id="exampleInputJobTitle"
                            placeholder="Enter job title"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputWebsite">Website</label>
                        <input
                            type="url"
                            class="form-control"
                            id="exampleInputWebsite"
                            placeholder="Enter website URL"
                        />
                    </div>
                    <div class="form-group">
                        <label for="exampleInputBio">Bio</label>
                        <textarea
                            class="form-control"
                            id="exampleInputBio"
                            rows="4"
                            placeholder="Tell us about yourself"
                        ></textarea>
                    </div>
                    <div class="form-group">
                        <label for="exampleInputFile">File input</label>
                        <div class="input-group">
                            <div class="custom-file">
                                <input
                                    type="file"
                                    class="custom-file-input"
                                    id="exampleInputFile"
                                />
                                <label class="custom-file-label" for="exampleInputFile"
                                    >Choose file</label
                                >
                            </div>
                            <div class="input-group-append">
                                <span class="input-group-text">Upload</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="exampleInputNotes">Additional Notes</label>
                        <textarea
                            class="form-control"
                            id="exampleInputNotes"
                            rows="4"
                            placeholder="Any additional notes"
                        ></textarea>
                    </div>
                    <div class="form-check">
                        <input
                            type="checkbox"
                            class="form-check-input"
                            id="exampleCheck1"
                        />
                        <label class="form-check-label" for="exampleCheck1"
                            >Check me out</label
                        >
                    </div>
                    <div class="form-check" style="margin-top: 0.5rem;">
                        <input
                            type="checkbox"
                            class="form-check-input"
                            id="exampleCheck2"
                        />
                        <label class="form-check-label" for="exampleCheck2"
                            >I agree to the terms and conditions</label
                        >
                    </div>
                </div>
                <!-- /.card-body -->

                <div class="card-footer">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </form>
        </div>
        <!-- /.card -->

        <!-- jQuery -->
        <script src="../../../plugins/jquery/jquery.min.js"></script>
        <!-- Bootstrap 4 -->
        <script src="../../../plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
        <!-- bs-custom-file-input -->
        <script src="../../../plugins/bs-custom-file-input/bs-custom-file-input.min.js"></script>
        <!-- AdminLTE App -->
        <script src="../../../dist/js/adminlte.min.js"></script>
        <!-- Page specific script -->
        <script>
            $(function () {
                bsCustomFileInput.init();
            });
        </script>
    </body>
</html>
